<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAMINA TRAINING</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .progress-shrink { transition: width 1s linear; }
        .mute-btn { transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        // ========================================================
        // [SECTION: UI ICONS & ASSETS]
        // ========================================================
        const IconDumbbell = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m14.4 14.4 5.6 5.6"/><path d="M22 14.5V22h-7.5"/><path d="m9.6 9.6-5.6-5.6"/><path d="M2 9.5V2h7.5"/><path d="m4.3 19.7 15.4-15.4"/><path d="m11 15-4-4"/><path d="m13 9 4 4"/></svg>;
        const IconActivity = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const IconSkip = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>;
        const IconBack = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;

        // ========================================================
        // [SECTION: AUDIO ENGINE & SFX]
        // ========================================================
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playTone = (freq, duration, volume = 1.0) => {
            if (!audioCtx || audioCtx.state !== 'running') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        const SFX = {
            tick: () => playTone(880, 0.1, 0.5),
            start: () => {
                playTone(440, 0.1, 0.8); 
                setTimeout(() => playTone(554, 0.1, 0.8), 100);
                setTimeout(() => playTone(659, 0.3, 1.0), 200);
            },
            end: () => {
                playTone(659, 0.1, 1.0);
                setTimeout(() => playTone(329, 0.4, 1.0), 100);
            },
            click: () => playTone(600, 0.05, 0.4)
        };

        // ========================================================
        // [SECTION: WORKOUT CONFIGURATION]
        // ========================================================
        const kneeActivation = [
            { name: "Static Squat Hold", target: "40s x 2", rhythm: "Hold 30-60 Degree Angle", rest: 20, totalTime: 40, type: "activation", sets: 2 },
            { name: "Lunge Hold (L)", target: "30s", rhythm: "Keep Tension", rest: 15, totalTime: 30, type: "activation", sets: 1 },
            { name: "Lunge Hold (R)", target: "30s", rhythm: "Keep Tension", rest: 60, totalTime: 30, type: "activation", sets: 1 }
        ];

        const workoutData = {
            A: {
                id: 'A', title: "Day A: Strength", icon: <IconDumbbell />, color: "bg-blue-600",
                exercises: [
                    ...kneeActivation,
                    // 1. 深蹲 (3 Sets)
                    { name: "Squat", target: "10 Reps", rhythm: "3s Down / 2s Hold / 1s Up", rest: 60, totalTime: 60, type: "3 SETS", sets: 3 },
                    // 2. 罗马尼亚硬拉 (3 Sets)
                    { name: "Romanian Deadlift", target: "10 Reps", rhythm: "3s Down / 0s Hold / 1s Up", rest: 45, totalTime: 40, type: "3 SETS", sets: 3 },
                    // 3. 俯身划船 (3 Sets) - 计时 set 40s，休息 1min
                    { name: "Bent-Over Row", target: "40s", rhythm: "2s Down / 0s Hold / 1s Up", rest: 60, totalTime: 40, type: "3 SETS", sets: 3 },
                    // 4. 实力推 (3 Sets)
                    { name: "Standing Press", target: "10 Reps", rhythm: "2s Down / 0s Hold / 1s Up", rest: 45, totalTime: 30, type: "3 SETS", sets: 3 },
                    // 5. 弯举 (3 Sets)
                    { name: "Barbell Curl", target: "20 Reps", rhythm: "Power Burst / High Volume", rest: 60, totalTime: 40, type: "3 SETS", sets: 3 }
                ]
            },
            B: {
                id: 'B', title: "Day B: Endurance", icon: <IconActivity />, color: "bg-emerald-600",
                exercises: [
                    ...kneeActivation,
                    { name: "Kettlebell Swing", target: "60s", rhythm: "1s Down / 1s Up", rest: 45, totalTime: 60, type: "circuit", sets: 3 },
                    { name: "Cross-leg Climber", target: "60s", rhythm: "1s Left / 1s Right", rest: 45, totalTime: 60, type: "circuit", sets: 3 },
                    { name: "Glute Bridge", target: "60s", rhythm: "1s Down / 1s Up / 2s Peak Hold", rest: 45, totalTime: 60, type: "circuit", sets: 3 },
                    { name: "Push-up Hold", target: "60s", rhythm: "2s Down / 2s Hold / 1s Up", rest: 45, totalTime: 60, type: "circuit", sets: 3 }
                ]
            }
        };

        // ========================================================
        // [SECTION: CORE APP LOGIC]
        // ========================================================
        function App() {
            const [view, setView] = React.useState('home');
            const [activePlan, setActivePlan] = React.useState(null);
            const [exIdx, setExIdx] = React.useState(0);
            const [currentSet, setCurrentSet] = React.useState(1);
            const [timerMode, setTimerMode] = React.useState('idle'); 
            const [timeLeft, setTimeLeft] = React.useState(0);
            const [totalTime, setTotalTime] = React.useState(0);
            const [isRunning, setIsRunning] = React.useState(false);
            const [soundMuted, setSoundMuted] = React.useState(false);

            const currentEx = activePlan?.exercises[exIdx];
            const totalEx = activePlan?.exercises.length || 0;
            const progressPercent = totalTime > 0 ? (timeLeft / totalTime) * 100 : 0;

            const initTimer = (time) => {
                setTimeLeft(time);
                setTotalTime(time);
            };

            const resetEverything = () => {
                setIsRunning(false);
                setTimerMode('idle');
                setExIdx(0);
                setCurrentSet(1);
                setActivePlan(null);
                setView('home');
            };

            const handleAction = (callback) => {
                initAudio();
                if (callback) callback();
            };

            // === [LOGIC: NEXT EXERCISE PREVIEW] ===
            const getNextExName = () => {
                if (!activePlan) return "";
                const circuitIndices = activePlan.exercises.map((e, i) => e.type === 'circuit' ? i : -1).filter(i => i !== -1);
                const firstCircuitIdx = circuitIndices[0];
                const lastCircuitIdx = circuitIndices[circuitIndices.length - 1];

                // 修改：去除了 non-circuit 下的 (Next Set) 提示
                if (currentSet < currentEx.sets && (currentEx.type === 'activation' || currentEx.type === '3 SETS')) {
                    // return `${currentEx.name} (Next Set)`; // 原来的
                    return currentEx.name; // 修改后的
                }
                
                if (currentEx.type === 'circuit') {
                    if (exIdx < lastCircuitIdx) return activePlan.exercises[exIdx + 1].name;
                    if (currentSet < 3) return activePlan.exercises[firstCircuitIdx].name;
                    return "Finish Workout";
                }
                
                if (exIdx < totalEx - 1) return activePlan.exercises[exIdx + 1].name;
                return "Finish Workout";
            };

            // === [LOGIC: STATE TRANSITION] ===
            const advanceExercise = (isManual = false) => {
                const shouldAutoStart = !isManual;

                const isLastCircuit = currentEx.type === 'circuit' && 
                                    exIdx === activePlan.exercises.map((e, i) => e.type === 'circuit' ? i : -1).filter(i => i !== -1).pop() &&
                                    currentSet === 3;
                const isLastNormal = currentEx.type !== 'circuit' && exIdx === totalEx - 1 && currentSet === currentEx.sets;

                if (isLastCircuit || isLastNormal) {
                    alert("Workout Complete!");
                    resetEverything();
                    return;
                }

                if (currentSet < currentEx.sets && (currentEx.type === 'activation' || currentEx.type === '3 SETS')) {
                    setCurrentSet(prev => prev + 1);
                    setTimerMode('exercise');
                    initTimer(currentEx.totalTime);
                    setIsRunning(shouldAutoStart);
                } else {
                    if (currentEx.type === 'circuit') {
                        const circuitIndices = activePlan.exercises.map((e, i) => e.type === 'circuit' ? i : -1).filter(i => i !== -1);
                        const firstCircuitIdx = circuitIndices[0];
                        const lastCircuitIdx = circuitIndices[circuitIndices.length - 1];

                        if (exIdx < lastCircuitIdx) {
                            setExIdx(exIdx + 1);
                        } else {
                            setCurrentSet(prev => prev + 1);
                            setExIdx(firstCircuitIdx);
                        }
                    } else {
                        setExIdx(exIdx + 1);
                        setCurrentSet(1);
                    }
                    setTimerMode('exercise');
                    initTimer(activePlan.exercises[exIdx].totalTime);
                    setIsRunning(shouldAutoStart);
                }
            };

            const jumpToExercise = (idx) => {
                handleAction(() => {
                    setExIdx(idx);
                    setCurrentSet(1);
                    setTimerMode('exercise');
                    setIsRunning(false); 
                    initTimer(activePlan.exercises[idx].totalTime);
                });
            };

            const toggleTimer = () => {
                handleAction(() => {
                    if (!soundMuted) SFX.click();
                    if (timerMode === 'idle') {
                        setTimerMode('exercise');
                        if (!soundMuted) SFX.start();
                        setTimeLeft(prev => prev - 1);
                    } else if (!isRunning) {
                        setTimeLeft(prev => Math.max(0, prev - 1));
                    }
                    setIsRunning(!isRunning);
                });
            };

            // === [LOGIC: TIMER EFFECTS] ===
            React.useEffect(() => {
                if (currentEx) initTimer(currentEx.totalTime);
            }, [exIdx, activePlan]);

            React.useEffect(() => {
                let interval;
                if (isRunning && timeLeft > 0) {
                    interval = setInterval(() => {
                        setTimeLeft(prev => {
                            const next = prev - 1;
                            if (!soundMuted && next <= 5 && next > 0) SFX.tick(); 
                            return next;
                        });
                    }, 1000);
                } else if (isRunning && timeLeft === 0) {
                    if (!soundMuted) SFX.end();
                    
                    const isFinalSet = (currentEx.type === 'circuit' && currentSet === 3 && exIdx === activePlan.exercises.map((e, i) => e.type === 'circuit' ? i : -1).filter(i => i !== -1).pop()) ||
                                      (currentEx.type !== 'circuit' && exIdx === totalEx - 1 && currentSet === currentEx.sets);

                    if (timerMode === 'exercise' && !isFinalSet) {
                        setTimerMode('rest');
                        setTimeLeft(currentEx.rest);
                        setTotalTime(currentEx.rest);
                    } else {
                        advanceExercise(false); 
                    }
                }
                return () => clearInterval(interval);
            }, [isRunning, timeLeft, soundMuted, timerMode]);

            const startWorkout = (id) => {
                handleAction(() => {
                    setActivePlan(workoutData[id]);
                    setExIdx(0);
                    setCurrentSet(1);
                    setTimerMode('idle');
                    setView('workout');
                });
            };

            const formatSecs = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;

            // ========================================================
            // [SECTION: RENDER HOME VIEW]
            // ========================================================
            if (view === 'home') {
                return (
                    <div className="min-h-screen text-white p-6 flex flex-col items-center justify-center">
                        <h1 className="text-4xl font-black mb-12 tracking-tighter">STAMINA TRAINING</h1>
                        <div className="grid gap-6 w-full max-w-md">
                            {Object.values(workoutData).map(p => (
                                <button key={p.id} onClick={() => startWorkout(p.id)} className="flex items-center gap-5 p-6 bg-slate-900 border border-slate-800 rounded-3xl text-left hover:border-slate-600 transition-all group">
                                    <div className={`p-4 rounded-2xl ${p.color} group-hover:scale-110 transition-transform`}>{p.icon}</div>
                                    <div>
                                        <h3 className="text-xl font-bold">{p.title}</h3>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            // ========================================================
            // [SECTION: RENDER WORKOUT VIEW]
            // ========================================================
            return (
                <div className="min-h-screen text-white flex flex-col">
                    <header className="p-4 bg-slate-900/50 backdrop-blur-md sticky top-0 border-b border-slate-800 flex items-center justify-between z-10">
                        <button onClick={resetEverything} className="p-2 hover:bg-slate-800 rounded-xl transition-colors"><IconBack /></button>
                        <div className="text-center">
                            <p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 font-bold">
                                {currentEx.type === 'circuit' ? `Round: ${currentSet} / 3` : `Set: ${currentSet} / ${currentEx.sets}`}
                            </p>
                            <h2 className="font-bold">{activePlan.title}</h2>
                        </div>
                        <button 
                            onClick={() => handleAction(() => setSoundMuted(!soundMuted))}
                            className="mute-btn px-3 py-2 rounded-xl text-sm"
                            style={{ color: soundMuted ? '#fff' : '#6b7280', fontWeight: soundMuted ? '700' : '400', backgroundColor: soundMuted ? 'rgba(55,65,81,0.8)' : 'transparent' }}
                        >{soundMuted ? 'Muted' : 'Sound On'}</button>
                    </header>

                    <main className="flex-1 p-6 flex flex-col items-center">
                        <div className="w-full max-w-md text-center">
                            <div className="mb-6">
                                {/* 正在进行中的运动名称 (3xl) */}
                                <h2 className="text-3xl font-black text-emerald-400 leading-tight">{currentEx.name}</h2>
                                <p className="text-sm text-slate-400 font-medium mt-1">{currentEx.rhythm}</p>
                            </div>

                            <div className="w-full h-24 bg-slate-800/50 rounded-xl relative overflow-hidden mb-8">
                                <div className={`progress-shrink absolute top-0 left-0 h-full rounded-xl ${timerMode === 'exercise' ? 'bg-emerald-600/70' : 'bg-blue-600/70'}`} style={{ width: `${progressPercent}%` }}></div>
                                <div className="absolute inset-0 flex items-center justify-center">
                                    <span className="text-5xl font-black text-white">{formatSecs(timeLeft)}</span>
                                </div>
                                <div className="absolute bottom-2 right-4 flex items-center">
                                    <span className="text-lg font-medium text-slate-200 uppercase tracking-tighter">{timerMode === 'exercise' ? 'GO!' : timerMode === 'rest' ? 'REST' : 'READY'}</span>
                                </div>
                            </div>

                            <div className="space-y-4 mb-8">
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => handleAction(() => { setIsRunning(false); initTimer(currentEx.totalTime); setTimerMode('idle'); })} className="bg-slate-800 py-6 rounded-2xl font-bold text-lg active:bg-slate-700">Reset</button>
                                    <button onClick={toggleTimer} className={`py-6 rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-all ${isRunning ? 'bg-slate-700 border-2 border-slate-500' : (timerMode === 'exercise' ? 'bg-emerald-600' : 'bg-blue-600')}`}>
                                        {isRunning ? "Pause" : "Start"}
                                    </button>
                                </div>
                                {/* === [UI CHANGE: Skip/Next Button] === */}
                                {/* 修改：字号调整为 2xl，白色字体，Next: 提示文本，去除两行，加粗动作名 */}
                                <button onClick={() => handleAction(() => advanceExercise(true))} className="w-full flex items-center justify-center gap-2 text-white font-medium text-2xl py-4 transition-all opacity-80 hover:opacity-100">
                                    Next: <span className="font-black">{getNextExName()}</span> <IconSkip />
                                </button>
                            </div>

                            <div className="border-t border-slate-800 pt-6">
                                <h4 className="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mb-4 text-center">Workout Path</h4>
                                <div className="space-y-2 text-left">
                                    {activePlan.exercises.map((ex, idx) => (
                                        <button 
                                            key={idx} 
                                            onClick={() => jumpToExercise(idx)}
                                            className={`w-full flex items-center justify-between p-3 rounded-2xl border transition-all ${idx === exIdx ? 'bg-slate-800 border-emerald-500 opacity-100 shadow-[0_0_15px_rgba(16,185,129,0.2)]' : 'bg-slate-900 border-slate-800 opacity-40 hover:opacity-80'}`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className={`w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold ${idx === exIdx ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-500'}`}>{idx + 1}</div>
                                                <div className="flex flex-col items-start">
                                                    <span className={`text-sm ${idx === exIdx ? 'text-white font-extrabold' : 'text-slate-400'}`}>{ex.name}</span>
                                                    <span className="text-[9px] text-slate-600 font-bold uppercase tracking-widest">{ex.target}</span>
                                                </div>
                                            </div>
                                            <span className="text-[9px] text-slate-500 font-black uppercase tracking-tighter px-2 py-1 bg-slate-800/50 rounded-md">{ex.type}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
